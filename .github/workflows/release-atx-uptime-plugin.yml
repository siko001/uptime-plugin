name: Release WordPress Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.0.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: wordpress-plugin-release
  cancel-in-progress: false

jobs:
  release-plugin:
    runs-on: ubuntu-latest

    env:
      PLUGIN_SLUG: atx-uptime-monitor
      PLUGIN_FILE: atx-uptime-monitor.php
      ZIP_NAME: atx-uptime-monitor.zip
      PLUGIN_NAME: ATX Uptime Monitor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Accept both v-prefixed and plain semver tags: v1.2.3 or 1.2.3
            LATEST_VERSION="$(
              git tag --list \
                | sed -nE 's/^v?([0-9]+\.[0-9]+\.[0-9]+)$/\1/p' \
                | sort -V \
                | tail -n 1
            )"

            if [ -z "$LATEST_VERSION" ]; then
              VERSION="1.0.0"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Version must look like 1.0.1 or 1.0.1-beta1; got: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_tag=${GITHUB_REF_NAME:-}" >> "$GITHUB_OUTPUT"

      - name: Ensure canonical v-tag exists
        if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref_name, 'v')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          CANONICAL_TAG="v${VERSION}"

          if git rev-parse "refs/tags/${CANONICAL_TAG}" >/dev/null 2>&1; then
            echo "Canonical tag ${CANONICAL_TAG} already exists."
            exit 0
          fi

          git tag "${CANONICAL_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${CANONICAL_TAG}"

      - name: Build plugin ZIP
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DIR="build/${PLUGIN_SLUG}"

          rm -rf build dist
          mkdir -p "$BUILD_DIR" dist

          rsync -a ./ "$BUILD_DIR/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='.DS_Store'

          php -r '
            $file = $argv[1];
            $version = $argv[2];
            $contents = file_get_contents($file);
            $contents = preg_replace_callback(
                "/^([ \t*]*Version:[ \t]*).+$/mi",
                static fn ($matches) => $matches[1].$version,
                $contents,
                1
            );
            file_put_contents($file, $contents);
          ' "$BUILD_DIR/${PLUGIN_FILE}" "$VERSION"

          cd build
          zip -r "../dist/${ZIP_NAME}" "${PLUGIN_SLUG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "dist/${ZIP_NAME}" --clobber
            gh release edit "$TAG" --latest
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            gh release create "$TAG" "dist/${ZIP_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${PLUGIN_NAME} v${VERSION}" \
              --notes "Release v${VERSION}" \
              --latest
          else
            gh release create "$TAG" "dist/${ZIP_NAME}" \
              --title "${PLUGIN_NAME} v${VERSION}" \
              --notes "Release v${VERSION}" \
              --latest
          fi
