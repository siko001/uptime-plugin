name: Release Panza Uptime Monitor Plugin

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.0.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: panza-plugin-release
  cancel-in-progress: false

jobs:
  release-plugin:
    runs-on: ubuntu-latest

    env:
      PLUGIN_SLUG: panza-uptime-monitor
      PLUGIN_FILE: panza-uptime-monitor.php
      ZIP_NAME: panza-uptime-monitor.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

            if [ -z "$LATEST_TAG" ]; then
              VERSION="1.0.0"
            else
              BASE="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Version must look like 1.0.1 or 1.0.1-beta1; got: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create automatic tag
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "${GITHUB_SHA}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"

      - name: Build plugin ZIP
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DIR="build/${PLUGIN_SLUG}"

          rm -rf build dist
          mkdir -p "$BUILD_DIR" dist

          rsync -a ./ "$BUILD_DIR/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='.DS_Store'

          php -r '
            $file = $argv[1];
            $version = $argv[2];
            $contents = file_get_contents($file);
            $contents = preg_replace("/^([ \t*]*Version:[ \t]*).+$/mi", "$1".$version, $contents, 1);
            file_put_contents($file, $contents);
          ' "$BUILD_DIR/${PLUGIN_FILE}" "$VERSION"

          cd build
          zip -r "../dist/${ZIP_NAME}" "${PLUGIN_SLUG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "dist/${ZIP_NAME}" --clobber
          else
            gh release create "$TAG" "dist/${ZIP_NAME}" \
              --title "Panza Uptime Monitor v${VERSION}" \
              --notes "Release v${VERSION}"
          fi
